name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Required for manual runs."
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-14
          - platform: macos-x64
            runner: macos-14
            bun_target: bun-darwin-x64
            rust_target: x86_64-apple-darwin
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG"            >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"    >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/wgpu/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('packages/wgpu/Cargo.lock') }}


      - name: Cache rcodesign (macOS)
        if: startsWith(matrix.platform, 'macos')
        id: rcodesign-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/rcodesign
          key: rcodesign-${{ runner.os }}-${{ runner.arch }}

      - name: Install rcodesign (macOS)
        if: startsWith(matrix.platform, 'macos') && steps.rcodesign-cache.outputs.cache-hit != 'true'
        run: cargo install apple-codesign

      - name: Add Rust cross target
        if: matrix.rust_target
        run: rustup target add ${{ matrix.rust_target }}

      - run: bun install --frozen-lockfile

      - name: Build
        env:
          HANCE_VERSION: ${{ steps.v.outputs.version }}
          BUN_TARGET_IN: ${{ matrix.bun_target }}
          RUST_TARGET_IN: ${{ matrix.rust_target }}
        run: |
          [ -n "$BUN_TARGET_IN" ] && export BUN_TARGET="$BUN_TARGET_IN"
          [ -n "$RUST_TARGET_IN" ] && export CARGO_BUILD_TARGET="$RUST_TARGET_IN"
          bun run build

      - name: Stage release dir
        env:
          HANCE_PLATFORM: ${{ matrix.platform }}
          CARGO_BUILD_TARGET: ${{ matrix.rust_target }}
        run: bun run scripts/stage-release.ts

      - name: Create tarball
        run: tar -czf hance-${{ matrix.platform }}.tar.gz -C dist hance-${{ matrix.platform }}

      - uses: actions/upload-artifact@v4
        with:
          name: hance-${{ matrix.platform }}
          path: hance-${{ matrix.platform }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          shasum -a 256 hance-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Copy install.sh
        run: cp scripts/install.sh artifacts/install.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.v.outputs.tag }}
        run: |
          # Anchor release notes to the last *published* release, not the
          # previous git tag. If a prior tag's release workflow failed and
          # never published, --generate-notes would otherwise only diff
          # against that ghost tag and miss every commit in between.
          PREV=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName -q '.[0].tagName' || true)
          NOTES_ARGS=(--generate-notes)
          if [ -n "$PREV" ] && [ "$PREV" != "$TAG" ]; then
            NOTES_ARGS+=(--notes-start-tag "$PREV")
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            "${NOTES_ARGS[@]}" \
            artifacts/hance-*.tar.gz \
            artifacts/checksums.txt \
            artifacts/install.sh

  publish-npm:
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract artifacts
        run: |
          mkdir -p staging
          for tarball in artifacts/hance-*.tar.gz; do
            tar -xzf "$tarball" -C staging
          done

      - name: Prepare npm packages
        run: bun run scripts/prepare-npm.ts staging ${{ steps.v.outputs.version }}

      - name: Set executable bits
        run: |
          chmod +x npm/@orva-studio/cli-*/bin/hance
          chmod +x npm/@orva-studio/cli-*/bin/hance-gpu
          chmod +x npm/hance/bin/hance

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          for pkg in npm/@orva-studio/cli-*/; do
            if [ -d "$pkg/bin" ]; then
              npm publish "$pkg" --access public
            fi
          done

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./npm/hance --access public
